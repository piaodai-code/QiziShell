<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none';">
  <title>启孜</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="titlebar">
      <div class="titlebar-left"></div>
      <div class="titlebar-center">
        <button type="button" class="titlebar-agent-btn" id="titlebar-agent-btn" title="切换 Agent" aria-label="切换 Agent">
          <span class="titlebar-agent-avatar" id="titlebar-agent-avatar"></span>
        </button>
        <div class="agent-popup" id="agent-popup" hidden></div>
      </div>
      <div class="titlebar-right">
        <span class="status-pill" id="status">连接中…</span>
        <button type="button" class="icon-btn" id="settings-btn" title="设置">⋯</button>
      </div>
    </header>
    <main class="messages" id="messages">
      <div class="msg-hint">还没有消息，发个试试 👋</div>
    </main>
    <footer class="composer" id="composer">
      <div class="composer-resize" id="composer-resize"></div>
      <div class="composer-body" id="composer-body">
      <div class="composer-tools">
        <div class="composer-tools-left">
          <div class="emoji-picker-wrap">
            <button type="button" class="icon-btn icon-btn-img" id="emoji-btn" title="表情" aria-expanded="false" aria-haspopup="true">
              <img src="assets/icons/face.png" alt="" aria-hidden="true">
            </button>
          </div>
          <button type="button" class="icon-btn icon-btn-img" id="screenshot-btn" title="截屏 (Cmd+Shift+4 也行)">
            <img src="assets/icons/scissors.png" alt="" aria-hidden="true">
          </button>
          <button type="button" class="icon-btn icon-btn-img" id="pick-image-btn" title="从文件夹选择图片">
            <img src="assets/icons/picture.png" alt="" aria-hidden="true">
          </button>
          <button type="button" class="icon-btn icon-btn-img" id="pick-file-btn" title="从文件夹选择文件">
            <img src="assets/icons/folder.png" alt="" aria-hidden="true">
          </button>
          <button type="button" class="icon-btn icon-btn-img icon-btn-mic" id="mic-btn" title="语音输入（请先在设置中安装语音识别）" disabled aria-disabled="true">
            <img src="assets/icons/mic.png" alt="" aria-hidden="true">
          </button>
        </div>
        <div class="context-meter" id="context-meter" title="Context 占用">
          <div class="context-meter-bar" aria-hidden="true">
            <div class="context-meter-fill" id="context-meter-fill"></div>
          </div>
          <span class="context-meter-text" id="context-meter-text">—</span>
        </div>
        <div class="model-picker-wrap">
          <button type="button" class="model-picker-btn" id="model-picker-btn" title="切换模型">
            <span id="model-badge">…</span>
            <span class="model-picker-caret">▴</span>
          </button>
          <div class="model-popup" id="model-popup" hidden></div>
        </div>
      </div>
      <div class="cmd-popup" id="cmd-popup" hidden></div>
      <div class="composer-pending" id="composer-pending" hidden></div>
      <div class="composer-quote" id="composer-quote" hidden>
        <button type="button" class="composer-quote-remove" id="composer-quote-remove" title="移除引用" aria-label="移除引用">×</button>
        <span class="composer-quote-text" id="composer-quote-text"></span>
      </div>
      <div class="stt-recording-bar" id="stt-recording-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="stt-recording-title">
        <div class="stt-recording-panel">
          <p class="stt-recording-title" id="stt-recording-title">请说话</p>
          <div class="stt-recording-wave-wrap">
            <canvas class="stt-recording-wave" id="stt-recording-wave" width="320" height="56" aria-hidden="true"></canvas>
          </div>
          <div class="stt-recording-actions">
            <button type="button" class="stt-recording-cancel-btn" id="stt-recording-cancel-btn">取消</button>
            <button type="button" class="stt-recording-stop-btn" id="stt-recording-stop-btn">完成</button>
          </div>
        </div>
      </div>
      <div class="composer-input-wrap" id="composer-input-wrap">
        <textarea id="input" placeholder="输入消息，输入 / 看可用命令…" rows="1"></textarea>
        <button type="button" class="composer-send-btn" id="composer-send-btn" title="发送" aria-label="发送" disabled>
          <svg class="composer-send-icon composer-send-icon-send" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path fill="currentColor" d="M8 3.25 3.75 11.75h8.5L8 3.25Z"/>
          </svg>
          <svg class="composer-send-icon composer-send-icon-stop" viewBox="0 0 16 16" width="10" height="10" aria-hidden="true">
            <rect fill="currentColor" x="4" y="4" width="8" height="8" rx="1.2"/>
          </svg>
        </button>
      </div>
      </div>
      <div class="emoji-picker" id="emoji-picker" hidden role="dialog" aria-label="选择表情"></div>
      <div class="composer-multiselect" id="composer-multiselect" hidden>
        <span class="composer-multiselect-hint" id="multiselect-hint">已选 0 条</span>
        <div class="composer-multiselect-actions">
          <button type="button" class="multiselect-btn" id="multiselect-cancel-btn">取消</button>
          <button type="button" class="multiselect-btn" id="multiselect-export-btn" disabled>输出</button>
          <button type="button" class="multiselect-btn multiselect-btn-primary" id="multiselect-send-btn" disabled>发送</button>
        </div>
      </div>
    </footer>
  </div>
  <!-- 图片放大 modal（点击消息气泡里的图打开） -->
  <div class="msg-context-menu" id="msg-context-menu" hidden role="menu">
    <button type="button" class="msg-context-item" data-action="quote" role="menuitem">
      <img src="assets/icons/quotation.png" alt="" class="msg-context-icon" aria-hidden="true">
      <span>引用</span>
    </button>
    <button type="button" class="msg-context-item" data-action="forward" role="menuitem">
      <img src="assets/icons/forward.png" alt="" class="msg-context-icon" aria-hidden="true">
      <span>转发</span>
    </button>
    <button type="button" class="msg-context-item" data-action="multiselect" role="menuitem">
      <img src="assets/icons/selection.png" alt="" class="msg-context-icon" aria-hidden="true">
      <span>多选</span>
    </button>
    <button type="button" class="msg-context-item" data-action="export" role="menuitem">
      <img src="assets/icons/word.png" alt="" class="msg-context-icon" aria-hidden="true">
      <span>输出</span>
    </button>
  </div>
  <div class="forward-modal" id="forward-modal" hidden role="dialog" aria-modal="true" aria-labelledby="forward-modal-title">
    <div class="forward-panel">
      <div class="forward-header">
        <h2 class="forward-title" id="forward-modal-title">转发消息</h2>
      </div>
      <div class="forward-layout">
        <aside class="forward-agents">
          <div class="forward-agents-title">选择 Agent</div>
          <div class="forward-agents-list" id="forward-agents-list"></div>
        </aside>
        <section class="forward-right">
          <div class="forward-preview-wrap">
            <div class="forward-preview-meta" id="forward-preview-meta"></div>
            <div class="forward-preview-scroll" id="forward-preview-scroll">
              <div class="forward-preview-text" id="forward-preview-text"></div>
            </div>
            <div class="forward-preview-ellipsis" id="forward-preview-ellipsis" hidden>…</div>
          </div>
          <div class="forward-compose">
            <textarea id="forward-input" placeholder="添加留言（可选）" rows="3"></textarea>
            <div class="forward-actions">
              <button type="button" class="forward-btn forward-btn-secondary" id="forward-cancel-btn">取消</button>
              <button type="button" class="forward-btn forward-btn-primary" id="forward-send-btn">发送</button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
  <div class="img-modal" id="img-modal" hidden role="dialog" aria-modal="true">
    <button class="img-modal-close" type="button" title="关闭 (Esc)">×</button>
    <img class="img-modal-img" id="img-modal-img" alt="" />
  </div>
  <!-- 设置 -->
  <div class="settings-modal" id="settings-modal" hidden role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="settings-panel">
      <div class="settings-header">
        <h2 class="settings-title" id="settings-title">设置</h2>
        <button type="button" class="settings-close" id="settings-close-btn" title="关闭 (Esc)">×</button>
      </div>
      <div class="settings-tabs" role="tablist" aria-label="设置分类">
        <button type="button" class="settings-tab is-active" id="settings-tab-gateway" role="tab" aria-selected="true" aria-controls="settings-panel-gateway" data-settings-tab="gateway">Gateway 连接</button>
        <button type="button" class="settings-tab" id="settings-tab-stt" role="tab" aria-selected="false" aria-controls="settings-panel-stt" data-settings-tab="stt">语音识别</button>
      </div>
      <div class="settings-body">
        <div class="settings-tab-panel is-active" id="settings-panel-gateway" role="tabpanel" aria-labelledby="settings-tab-gateway" data-settings-panel="gateway">
        <section class="settings-section">
          <p class="settings-hint" id="settings-source-hint"></p>
          <label class="settings-field">
            <span class="settings-label">WSS 地址</span>
            <input type="url" class="settings-input" id="settings-ws-url" placeholder="向管理员索取，如 wss://host:18789" spellcheck="false" autocomplete="off">
          </label>
          <label class="settings-field">
            <span class="settings-label">Token</span>
            <div class="settings-token-row">
              <input type="password" class="settings-input" id="settings-token" placeholder="Gateway 认证 Token" spellcheck="false" autocomplete="off">
              <button type="button" class="settings-inline-btn" id="settings-token-toggle" title="显示/隐藏">显示</button>
            </div>
            <span class="settings-field-note" id="settings-token-note"></span>
          </label>
          <div class="settings-row-actions">
            <button type="button" class="settings-secondary-btn" id="settings-test-btn">测试连接</button>
            <span class="settings-status" id="settings-status" hidden></span>
          </div>
        </section>
        <section class="settings-section">
          <h3 class="settings-section-title">应用</h3>
          <label class="settings-check">
            <input type="checkbox" id="settings-launch-at-login">
            <span>登录时启动启孜 Shell</span>
          </label>
          <label class="settings-check">
            <input type="checkbox" id="settings-show-main-on-launch" checked>
            <span>启动时显示主窗口（关闭后仍保留在菜单栏）</span>
          </label>
        </section>
        <section class="settings-section settings-section-muted">
          <h3 class="settings-section-title">说明</h3>
          <ul class="settings-tips">
            <li>WSS 地址与 Token 均需向 Gateway 管理员索取；</li>
            <li>首次连接新设备需配对，管理员在 Gateway 批准；</li>
            <li>Agent、模型可在聊天界面内切换，无需在此配置。</li>
          </ul>
        </section>
        </div>
        <div class="settings-tab-panel" id="settings-panel-stt" role="tabpanel" aria-labelledby="settings-tab-stt" data-settings-panel="stt" hidden>
        <section class="settings-section" id="settings-stt-section">
          <p class="settings-hint" id="settings-stt-hint"></p>
          <span class="settings-status" id="settings-stt-status" hidden></span>
          <div class="settings-stt-unsupported" id="settings-stt-unsupported" hidden></div>
          <div class="settings-stt-install-panel" id="settings-stt-install-panel" hidden>
            <p class="settings-stt-intro">将自动安装 <strong>mlx-whisper-small</strong>（Apple Silicon 本地识别，无需选模型）。安装内容如下：</p>
            <ul class="settings-stt-components" id="settings-stt-components"></ul>
            <p class="settings-stt-total" id="settings-stt-total"></p>
            <div class="settings-row-actions">
              <button type="button" class="settings-primary-btn" id="settings-stt-install-btn">安装语音识别</button>
            </div>
            <div class="settings-stt-progress" id="settings-stt-progress" hidden>
              <div class="settings-stt-progress-bar"><div class="settings-stt-progress-fill" id="settings-stt-progress-fill"></div></div>
              <span class="settings-stt-progress-text" id="settings-stt-progress-text"></span>
            </div>
          </div>
          <div class="settings-stt-ready-panel" id="settings-stt-ready-panel" hidden>
            <p class="settings-stt-ready-msg">✓ 本地语音识别已就绪（mlx-whisper-small）</p>
            <div class="settings-stt-test">
              <div class="settings-stt-test-header">
                <span class="settings-label">测试识别（最长 30 秒）</span>
                <span class="settings-stt-timer" id="settings-stt-timer">00:00</span>
              </div>
              <div class="settings-row-actions settings-stt-record-row">
                <button type="button" class="settings-secondary-btn" id="settings-stt-record-btn">开始录音</button>
                <span class="settings-stt-record-result" id="settings-stt-record-result" hidden></span>
              </div>
              <textarea class="settings-stt-result" id="settings-stt-result" readonly placeholder="识别结果将显示在这里…" rows="3"></textarea>
            </div>
          </div>
        </section>
        </div>
      </div>
      <div class="settings-stt-uninstall-bar" id="settings-stt-uninstall-bar" hidden>
        <button type="button" class="settings-secondary-btn settings-stt-uninstall-btn" id="settings-stt-uninstall-btn">卸载语音识别</button>
      </div>
      <div class="settings-footer">
        <button type="button" class="settings-secondary-btn" id="settings-cancel-btn">取消</button>
        <button type="button" class="settings-primary-btn" id="settings-save-btn">保存</button>
      </div>
    </div>
  </div>
  <script src="dompurify.min.js"></script>
  <script src="marked.min.js"></script>
  <script src="message-time.js"></script>
  <script src="app.js"></script>
</body>
</html>
